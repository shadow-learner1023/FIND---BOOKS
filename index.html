<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Book Tracker</h1>
            <p>Keep track of your reading journey</p>
        </header>

        <main>
            <!-- Add Book Form -->
            <section class="add-book-section">
                <h2>Add New Book</h2>
                <form id="bookForm">
                    <div class="form-group">
                        <label for="title">Title:</label>
                        <input type="text" id="title" required placeholder="Enter book title">
                    </div>
                    <div class="form-group">
                        <label for="author">Author:</label>
                        <input type="text" id="author" required placeholder="Enter author name">
                    </div>
                    <div class="form-group">
                        <label for="genre">Genre:</label>
                        <input type="text" id="genre" placeholder="Enter genre">
                    </div>
                    <div class="form-group">
                        <label for="year">Year Published:</label>
                        <input type="number" id="year" placeholder="e.g., 2023">
                    </div>
                    <div class="form-group">
                        <label for="status">Status:</label>
                        <select id="status">
                            <option value="To Read">To Read</option>
                            <option value="Reading">Reading</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="rating">Rating (1-5):</label>
                        <input type="number" id="rating" min="1" max="5" placeholder="1-5">
                    </div>
                    <button type="submit" class="btn-add">Add Book</button>
                </form>
            </section>

            <!-- Filter Section -->
            <section class="filter-section">
                <h2>Filter Books</h2>
                <div class="filter-controls">
                    <input type="text" id="searchInput" placeholder="Search by title or author...">
                    <select id="statusFilter">
                        <option value="">All Status</option>
                        <option value="To Read">To Read</option>
                        <option value="Reading">Reading</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
            </section>

            <!-- Books Display -->
            <section class="books-section">
                <h2>Your Books</h2>
                <div id="booksContainer" class="books-container">
                    <p class="no-books">No books added yet. Start by adding your first book!</p>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
